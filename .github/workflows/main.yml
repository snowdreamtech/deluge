name: CI Main

on:
  push:
    branches:
      - flood  
    tags:
      - '*'
  workflow_dispatch:
jobs:
    buildx:
      runs-on: ubuntu-latest
      steps:
        -
          name: Checkout
          uses: actions/checkout@v4.1.7
          with:
            # [Required] Access token with `workflow` scope.
            token: ${{ secrets.WORKFLOW_SECRET }}
        - 
          name: Run GitHub Actions Version Updater
          uses: saadmk11/github-actions-version-updater@v0.8.1
          with:
            # [Required] Access token with `workflow` scope.
            token: ${{ secrets.WORKFLOW_SECRET }}
        -
          # Add support for more platforms with QEMU (optional)
          # https://github.com/docker/setup-qemu-action
          name: Set up QEMU
          uses: docker/setup-qemu-action@v3.1.0
        -
          name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3.4.0
        -
          name: Login to DockerHub
          uses: docker/login-action@v3.2.0
          with:
            username: ${{ secrets.DOCKER_HUB_USERNAME }}
            password: ${{ secrets.DOCKER_HUB_PASSWORD }}
        -
          name: Login to GitHub Container Registry
          uses: docker/login-action@v3.2.0
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}          
        -
          name: Build and push
          uses: docker/build-push-action@v6.3.0
          with:
            context: .
            platforms: linux/ppc64le
            push: true
            tags: |
              snowdreamtech/deluge:flood-latest
              snowdreamtech/deluge:flood-2.1.1
              snowdreamtech/deluge:flood-2.1
              snowdreamtech/deluge:flood-2
              ghcr.io/snowdreamtech/deluge:flood-latest
              ghcr.io/snowdreamtech/deluge:flood-2.1.1
              ghcr.io/snowdreamtech/deluge:flood-2.1
              ghcr.io/snowdreamtech/deluge:flood-2
             